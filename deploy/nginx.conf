upstream nomad_backend {
    server 127.0.0.1:8080;
    keepalive 8;
}

server {
    listen 80 default_server;
    server_name _;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;
    gzip_proxied any;

    # WebSocket camera streams
    location ~* ^/api/cameras/[0-9]+/stream {
        proxy_pass http://nomad_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 2s;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Hashed frontend assets — cache forever
    location ~* ^/assets/ {
        proxy_pass http://nomad_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://nomad_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 2s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        error_page 502 503 504 /restarting.html;
    }

    location = /restarting.html {
        root /opt/nomad-eye/deploy;
        internal;
    }
}

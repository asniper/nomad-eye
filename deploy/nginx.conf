upstream nomad_backend {
    server 127.0.0.1:8080;
    keepalive 8;
}

server {
    listen 80 default_server;
    server_name _;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;
    gzip_proxied any;

    include /etc/nginx/nomadeye-locations.conf;
}

# Self-signed by default (deploy/generate-self-signed-cert.sh) — browsers will show a
# one-time trust warning for LAN access, which is expected for a self-hosted device.
# "Enable HTTPS via Tailscale" in Settings → Network overwrites these same file paths
# with a real Let's Encrypt-backed cert for the device's *.ts.net hostname, then
# reloads nginx — no config change needed for that upgrade path.
server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/nomadeye.crt;
    ssl_certificate_key /etc/nginx/ssl/nomadeye.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;
    gzip_proxied any;

    include /etc/nginx/nomadeye-locations.conf;
}

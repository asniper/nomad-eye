<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nomad Eye — Restarting</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1A1A1A;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { text-align: center; padding: 2rem; }
    .brand {
      font-size: 1.5rem;
      font-weight: 700;
      color: #FFB800;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255,184,0,0.2);
      border-top-color: #FFB800;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 1.125rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: rgba(255,255,255,0.5); }
    .elapsed {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      margin-top: 1.5rem;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="brand">NOMAD EYE</div>
    <div class="spinner"></div>
    <h1>Service is restarting</h1>
    <p>This page will refresh automatically when ready.</p>
    <p class="elapsed" id="elapsed"></p>
  </div>
  <script>
    const start = Date.now();
    function fmt(s) {
      return s < 60 ? s + 's' : Math.floor(s / 60) + 'm ' + (s % 60) + 's';
    }
    setInterval(function() {
      document.getElementById('elapsed').textContent = fmt(Math.floor((Date.now() - start) / 1000));
    }, 1000);
    async function check() {
      try {
        const r = await fetch('/api/health', { cache: 'no-store' });
        if (r.ok) { window.location.reload(); return; }
      } catch {}
    }
    setInterval(check, 3000);
  </script>
</body>
</html>

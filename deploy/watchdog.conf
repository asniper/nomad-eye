; Arms the hardware watchdog timer (qcom_wdt on the Arduino Uno Q) via systemd.
; PID1 pings it as part of its normal event loop; if the whole system livelocks
; badly enough that even PID1 stops getting scheduled, the SoC hardware-resets
; itself — independent of network, sshd, or any userspace process being alive.
; This is the layer below nomad-eye-healthcheck.timer (which needs a working
; network stack and a live systemd to act) and the backend's MemoryMax cap
; (which only catches memory-growth hangs) — it's the one that still works if
; those two don't.
;
; 20s is comfortably inside this device's supported 1-32s range
; (/sys/class/watchdog/watchdog0/{min,max}_timeout).
[Manager]
RuntimeWatchdogSec=20s
